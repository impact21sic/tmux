# extend keys (make shift available)                                                                                                                                             21:43 [0/0]
set-option -g extended-keys on                                                                
# make colors normal                                                                          
set-option -g default-terminal "xterm-256color"                                               
# make the keyboard NORMAL                                                                    
set -gw xterm-keys on                                                                         
# change the prefix from ctrl+b to ctrl+f                                                     
unbind C-b                                                                                    
set-option -g prefix C-f                                                                      
bind C-f send-prefix                                                                          
bind -n C-f send-prefix                                                                       
# split panes with ctrl+o and ctrl+e                                                          
unbind e                                                                                      
unbind o                                                                                      
unbind %                                                                                      
bind -n C-e split-window -h -c "#{pane_current_path}" # split window in the current directory 
unbind '"'     
bind -n C-o split-window -v -c "#{pane_current_path}" # split window in the current directory 
# enable mouse control (clickable windows, panes, resizable panes)                            
set -g mouse on                                     
# switch panes using alt+arrows without prefix 
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U                    
bind -n M-Down select-pane -D
# search & select sessions                     
unbind s                  
bind -n M-s choose-session     
# detach client                                     
bind -n M-d detach-client                                                                               
# new session - current path                                                                            
bind -n M-n new-session -c "#{pane_current_path}"                                             
# status bar                                                                                            
set -g status-position bottom                 
set -g status-justify left                     
set -g status-left "#(~/.tmux/statusline.sh)"
set -g status-left-length 300      
set -g status-right ""                              
set -g status-interval 2                                                                                             
setw -g window-status-format ""                                                                                      
setw -g window-status-current-format ""
set-hook -g session-closed  'run-shell ~/.tmux/renumber-sessions.sh'                          
set-hook -g session-created 'run-shell ~/.tmux/renumber-sessions.sh'                          
# reload status line on the fly    
set-hook -g client-session-changed 'refresh-client -S'                                        
# switch sessions with alt + pageup & pagedown
bind -n M-PageDown switch-client -n                       
bind -n M-PageUp switch-client -p                         
# switch sessions with alt + number                       
bind -n M-1 switch-client -t 1                            
bind -n M-2 switch-client -t 2                            
bind -n M-3 switch-client -t 3                            
bind -n M-4 switch-client -t 4                            
bind -n M-5 switch-client -t 5                            
bind -n M-6 switch-client -t 6                            
bind -n M-7 switch-client -t 7
bind -n M-8 switch-client -t 8
bind -n M-9 switch-client -t 9
bind -n M-0 switch-client -t 10
